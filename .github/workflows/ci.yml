name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore AutoMappic.sln

    - name: Build
      run: dotnet build AutoMappic.sln --no-restore --configuration Release

    - name: Test
      run: dotnet run --project tests/AutoMappic.Tests/AutoMappic.Tests.csproj --configuration Release

    - name: Pack
      run: |
        dotnet pack src/AutoMappic.Core/AutoMappic.Core.csproj -c Release -o ./artifacts
        dotnet pack src/AutoMappic.Cli/AutoMappic.Cli.csproj -c Release -o ./artifacts

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg

  release:
    name: Publish to NuGet
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Push to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
