name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore AutoMappic.sln

    - name: Build
      run: dotnet build AutoMappic.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test AutoMappic.sln --no-build --configuration Release --verbosity normal

    - name: Pack
      run: |
        dotnet pack src/AutoMappic.Core/AutoMappic.Core.csproj -c Release -o ./artifacts
        dotnet pack src/AutoMappic.Generator/AutoMappic.Generator.csproj -c Release -o ./artifacts

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg
